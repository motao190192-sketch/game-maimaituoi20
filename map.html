<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành trình khám phá</title>

<link rel="stylesheet" href="style.css">

<style>

.map{
width:100%;
height:100vh;
position:relative;
background:linear-gradient(180deg,#0a2342,#123a63);
overflow:hidden;
}

.title{
position:absolute;
top:25px;
left:50%;
transform:translateX(-50%);
font-size:42px;
font-weight:bold;
color:#FFD54F;
text-shadow:0 0 20px gold;
}

.stage{

position:absolute;

width:95px;
height:95px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

background:#1E88E5;

font-size:40px;

cursor:pointer;

transition:.3s;

box-shadow:0 0 20px #29B6F6;

}

.stage:hover{

transform:scale(1.12);

}

.lock{

background:#555;

box-shadow:none;

}

svg{

position:absolute;

width:100%;

height:100%;

}

.info{

position:absolute;

right:20px;

top:20px;

background:rgba(255,255,255,.12);

padding:15px;

border-radius:15px;

}

</style>

</head>

<body>

<div class="map">

<div class="title">

🗺️ HÀNH TRÌNH KHÁM PHÁ

</div>

<div class="info">

⭐ Điểm: 0

<br><br>

⏰ 00:00

</div>

<svg>

<path d="M120 650 C250 560 330 520 390 430 S620 300 720 220 S900 120 1030 80"

stroke="#FFD54F"

stroke-width="8"

fill="none"

stroke-linecap="round"/>

</svg>

<div class="stage"

style="left:70px;bottom:60px;"

onclick="location.href='stage.html'">

🏠

</div>

<script>

function openStage2(){

if(localStorage.getItem("stage2")=="open"){

location.href="stage2.html";

}

}

</script>

<div class="stage lock"

style="left:560px;bottom:390px;">

🌲

</div>

<div class="stage lock"

style="left:820px;bottom:500px;">

⚔️

</div>

<div class="stage lock"

style="right:70px;top:60px;">

🏆

</div>

</div>

<script src="script.js"></script>
<script>
<script>

function goStage2(){

if(localStorage.getItem("stage2")=="open"){

window.location.href="stage2.html";

}

}

</script>
if(localStorage.getItem("stage2")=="open"){

let stage2=document.getElementById("stage2");

stage2.classList.remove("lock");

stage2.innerHTML="🚂";

}

</script>
<script>

function openStage2(){

if(localStorage.getItem("stage2")=="open"){

location.href="stage2.html";

}

}

</script>
</body>
</html>
