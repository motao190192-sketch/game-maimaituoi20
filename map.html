<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hành trình khám phá</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#06142b,#081b39,#0f2d5c);
height:100vh;
overflow:hidden;
color:white;
}

h1{
text-align:center;
padding-top:30px;
font-size:48px;
color:#FFD54F;
text-shadow:0 0 15px gold;
}

p{
text-align:center;
margin-top:10px;
font-size:20px;
color:#ddd;
}

.map{

position:relative;
width:100%;
height:75vh;

}

.line{

position:absolute;
height:6px;
background:#4fc3f7;
box-shadow:0 0 15px cyan;
border-radius:10px;

}

.stage{

position:absolute;
width:90px;
height:90px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
cursor:pointer;
transition:.3s;
box-shadow:0 0 25px #4fc3f7;

}

.stage:hover{

transform:scale(1.15);

}

.open{

background:#2196F3;

}

.lock{

background:#555;

}

.finish{

background:#ff9800;

}

.info{

position:absolute;
top:20px;
right:20px;
background:rgba(255,255,255,.1);
padding:15px 20px;
border-radius:15px;
backdrop-filter:blur(8px);

}

</style>

</head>

<body>

<h1>🗺 HÀNH TRÌNH KHÁM PHÁ</h1>

<p>Hoàn thành từng chặng để mở khóa chặng tiếp theo</p>

<div class="info">

⭐ Điểm: 0

<br><br>

⏰ 00:00

</div>

<div class="map">

<div class="line" style="left:140px;bottom:130px;width:180px;transform:rotate(-28deg);"></div>

<div class="line" style="left:330px;bottom:250px;width:220px;transform:rotate(18deg);"></div>

<div class="line" style="left:560px;bottom:200px;width:200px;transform:rotate(-35deg);"></div>

<div class="line" style="left:760px;bottom:350px;width:180px;transform:rotate(20deg);"></div>

<div class="stage open"
style="left:80px;bottom:70px;"
onclick="location.href='chang1.html'">

1

</div>

<div class="stage lock"
style="left:300px;bottom:210px;">

🔒

</div>

<div class="stage lock"
style="left:560px;bottom:150px;">

🔒

</div>

<div class="stage lock"
style="left:760px;bottom:320px;">

🔒

</div>

<div class="stage finish"
style="right:100px;top:80px;">

🏆

</div>

</div>

</body>

</html>
