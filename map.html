<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bản đồ hành trình</title>

<style>

body{
margin:0;
background:#081b33;
font-family:Arial;
overflow:hidden;
}

h1{
color:white;
text-align:center;
padding:20px;
}

.map{
position:relative;
width:100%;
height:85vh;
background:linear-gradient(#0b2f59,#1b5d91);
}

.stage{

position:absolute;

width:80px;
height:80px;

border-radius:50%;

background:gold;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
font-weight:bold;

cursor:pointer;

box-shadow:0 0 20px gold;

transition:.3s;

}

.stage:hover{
transform:scale(1.15);
}

svg{
position:absolute;
width:100%;
height:100%;
}

</style>

</head>

<body>

<h1>🗺️ HÀNH TRÌNH MÃI MÃI TUỔI HAI MƯƠI</h1>

<div class="map">

<svg>

<line x1="10%" y1="75%" x2="30%" y2="60%" stroke="white" stroke-width="6"/>

<line x1="30%" y1="60%" x2="50%" y2="35%" stroke="white" stroke-width="6"/>

<line x1="50%" y1="35%" x2="70%" y2="50%" stroke="white" stroke-width="6"/>

<line x1="70%" y1="50%" x2="88%" y2="20%" stroke="white" stroke-width="6"/>

</svg>

<div class="stage" style="left:8%;top:70%;" onclick="location='stage1.html'">1</div>

<div class="stage" style="left:28%;top:55%;" onclick="location='stage2.html'">2</div>

<div class="stage" style="left:48%;top:30%;" onclick="location='stage3.html'">3</div>

<div class="stage" style="left:68%;top:45%;" onclick="location='stage4.html'">4</div>

<div class="stage" style="left:86%;top:15%;" onclick="location='stage5.html'">🏆</div>

</div>

</body>
</html>
