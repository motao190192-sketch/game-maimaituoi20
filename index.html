<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mãi Mãi Tuổi Hai Mươi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#07142d,#13294d,#1f3b63);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.stars{
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:80px 80px;
background-position:0 0,40px 40px;
animation:move 60s linear infinite;
opacity:.5;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(300px);}
}

.box{
text-align:center;
z-index:2;
}

.book{
font-size:90px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-18px);}
}

h1{
margin-top:20px;
font-size:55px;
letter-spacing:3px;
text-shadow:0 0 20px gold;
}

p{
margin-top:20px;
font-size:22px;
opacity:.9;
}

button{
margin-top:45px;
padding:18px 50px;
font-size:22px;
border:none;
border-radius:60px;
cursor:pointer;
background:linear-gradient(45deg,#ffb300,#ff6f00);
color:white;
transition:.3s;
box-shadow:0 0 25px orange;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 45px gold;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="box">

<div class="book">📖</div>

<h1>MÃI MÃI<br>TUỔI HAI MƯƠI</h1>

<p>Bắt đầu hành trình khám phá lịch sử</p>

<button onclick="start()">BẮT ĐẦU</button>

</div>

<script>

function start(){

alert("Chặng 1 sẽ xuất hiện ở phiên bản tiếp theo!");

}

</script>

</body>

</html>
